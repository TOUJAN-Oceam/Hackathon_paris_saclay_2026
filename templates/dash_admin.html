<!DOCTYPE html>
<html>
<head>
    <title>Admin - Monitoring IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style> .blink { animation: blinker 1s linear infinite; } @keyframes blinker { 50% { opacity: 0; } } </style>
</head>
<body class="bg-dark text-white">
    <div class="container mt-4">
        <h2 class="d-flex justify-content-between">
            <span>Admin Dashboard (Modèle IA)</span>
            <span id="aiStatus" class="badge bg-secondary">En attente...</span>
        </h2>
        <hr>
        
        <div class="row">
            <div class="col-md-9">
                <div class="card bg-secondary text-white" id="graphCard">
                    <div class="card-header d-flex justify-content-between">
                        <span>Signal EEG (FP1 / FP2)</span>
                        <small id="filenameDisplay">...</small>
                    </div>
                    <div class="card-body" style="position: relative; height: 65vh;">
                        <canvas id="adminChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-dark">
                    <div class="card-header bg-warning fw-bold">DÉTECTION LIVE</div>
                    <div class="card-body text-center">
                        <h1 id="seizureText" class="display-4 fw-bold text-success">NON</h1>
                        <hr>
                        
                        <div class="row mb-3">
                            <div class="col-6">
                                <small class="text-muted">Amplitude Max</small>
                                <h5 id="val-amp">0 µV</h5>
                            </div>
                            <div class="col-6">
                                <small class="text-muted">Écart Type</small>
                                <h5 id="val-std">0</h5> </div>
                        </div>

                        <div class="bg-light p-2 rounded mb-3 border">
                            <small class="text-muted d-block fw-bold">Dernière Crise</small>
                            <div class="d-flex justify-content-between px-2 mt-1">
                                <span>Durée :</span>
                                <span id="val-prev-dur" class="fw-bold">-</span> </div>
                            <div class="d-flex justify-content-between px-2">
                                <span>Intervalle :</span>
                                <span id="val-prev-int" class="fw-bold">-</span> </div>
                        </div>
                        
                        <div id="durationBox" class="d-none mt-3 p-2 bg-danger text-white rounded">
                            Durée Crise Actuelle : <span id="val-dur" class="fw-bold">0</span>s
                        </div>
                    </div>
                </div>
                
                <div class="mt-3 text-center">
                    <small class="text-muted">ML : Random Forest</small>
                </div>
            </div>
        </div>
    </div>
    <script>
        const ctx = document.getElementById('adminChart').getContext('2d');

        // --- 1. PARAMÉTRAGE SYNCHRONISÉ ---
        const FETCH_INTERVAL = 2000;  // Réception toutes les 2s
        const DISPLAY_REFRESH = 50;   // Affichage toutes les 50ms (20 FPS)
        // Nombre d'images disponibles pour vider un paquet de 2s :
        const FRAMES_PER_FETCH = FETCH_INTERVAL / DISPLAY_REFRESH; // = 40 frames

        // --- 2. VARIABLES BUFFERS ---
        // Files d'attente (reçu mais pas encore affiché)
        let queueFP1 = [], queueFP2 = [], queueStatus = [], queueMeta = [];
        
        // Données affichées (sur le graphe)
        let showFP1 = [], showFP2 = [], showStatus = [], showLabels = [];
        
        // Vitesse de défilement (Calculée dynamiquement)
        let pointsPerFrame = 25; 
        let globalTime = 0;

        // --- 3. CONFIGURATION GRAPHIQUE (MODE SCOPE) ---
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { 
                        label: 'FP1', data: [], borderWidth: 2, pointRadius: 0,
                        segment: { borderColor: ctx => getColor(ctx, 0) }
                    },
                    { 
                        label: 'FP2', data: [], borderWidth: 2, pointRadius: 0,
                        segment: { borderColor: ctx => getColor(ctx, 1) }
                    }
                ]
            },
            options: { 
                animation: false, 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: true, labels: { color: 'white' } } },
                scales: { 
                    x: { 
                        display: true, type: 'linear',
                        title: { display: true, text: 'Temps (Fenêtre 30s)', color: '#aaa' },
                        grid: { color: '#333' },
                        ticks: { color: '#aaa', stepSize: 5, callback: v => (v < 0 ? '' : fmtTime(v)) },
                        min: -30, max: 0 // Le signal arrive à droite (0) et glisse vers la gauche
                    }, 
                    y: { display: true, min: -500, max: 500, grid: { color: '#333' }, ticks: { color: '#aaa' } } 
                }
            }
        });

        // --- 4. BOUCLE RÉSEAU (Toutes les 2s) ---
        setInterval(() => {
            fetch('/api/get_live_data')
                .then(r => r.json())
                .then(d => {
                    if(d.fp1 && d.fp1.length > 0) {
                        // 1. On remplit les files d'attente
                        queueFP1.push(...d.fp1);
                        queueFP2.push(...d.fp2);
                        queueStatus.push(...new Array(d.fp1.length).fill(d.is_seizure));

                        // 2. On prépare les métadonnées (Texte synchro)
                        const metaObj = {
                            filename: d.filename,
                            is_seizure: d.is_seizure,
                            is_seizure_raw: d.is_seizure_raw,
                            debug_label: d.debug_label,
                            debug_match: d.debug_match,
                            stats: d.stats
                        };
                        queueMeta.push(...new Array(d.fp1.length).fill(metaObj));

                        // 3. CALCUL DE LA FLUIDITÉ (Le secret est ici !)
                        // On doit vider ce nouveau paquet en exactement 40 frames.
                        // On divise la taille du paquet par 40.
                        // Ex: 1000 points / 40 = 25 points par frame.
                        let idealSpeed = Math.ceil(d.fp1.length / FRAMES_PER_FETCH);

                        // Petit mécanisme de sécurité :
                        // Si on a accumulé du retard (lag navigateur), on accélère légèrement (+20%)
                        if (queueFP1.length > d.fp1.length * 1.5) {
                            pointsPerFrame = Math.ceil(idealSpeed * 1.2);
                        } else {
                            pointsPerFrame = idealSpeed;
                        }
                    }
                })
                .catch(e => console.error(e));
        }, FETCH_INTERVAL);

        // --- 5. BOUCLE D'AFFICHAGE (Toutes les 50ms) ---
        setInterval(() => {
            if (queueFP1.length > 0) {
                
                // On consomme le nombre exact de points calculé
                // Math.min évite de planter s'il reste moins de points que prévu (fin de stream)
                let eatCount = Math.min(pointsPerFrame, queueFP1.length);
                
                const chunkFP1 = queueFP1.splice(0, eatCount);
                const chunkFP2 = queueFP2.splice(0, eatCount);
                const chunkStatus = queueStatus.splice(0, eatCount);
                const chunkMeta = queueMeta.splice(0, eatCount);

                // Avancée du temps (Simulée pour être fluide)
                // 5 secondes de signal sont jouées en 2 secondes réelles.
                // On avance de (5 / 40) secondes par frame environ.
                const dt = (5.0 / FRAMES_PER_FETCH) / eatCount * chunkFP1.length; 

                chunkFP1.forEach((_, i) => {
                    // On distribue le temps équitablement sur le chunk
                    globalTime += (dt / chunkFP1.length);
                    showLabels.push(globalTime);
                });

                // Ajout au graphe
                showFP1.push(...chunkFP1);
                showFP2.push(...chunkFP2);
                showStatus.push(...chunkStatus);

                // Mise à jour TEXTE (Dernier point du paquet)
                if(chunkMeta.length > 0) {
                    updateDashboard(chunkMeta[chunkMeta.length - 1]);
                }

                // SCROLLING (Scope)
                chart.options.scales.x.min = globalTime - 30;
                chart.options.scales.x.max = globalTime;

                // NETTOYAGE (Max 30s en mémoire)
                if (showFP1.length > 6000) {
                    const del = showFP1.length - 6000;
                    showFP1.splice(0, del);
                    showFP2.splice(0, del);
                    showStatus.splice(0, del);
                    showLabels.splice(0, del);
                }

                // DESSIN
                chart.data.labels = showLabels;
                chart.data.datasets[0].data = showFP1;
                chart.data.datasets[1].data = showFP2;
                chart.update('none');
            }
        }, DISPLAY_REFRESH);

        // --- FONCTIONS UTILITAIRES ---
        function getColor(ctx, datasetIndex) {
            const i = ctx.p0DataIndex;
            if(i >= 0 && i < showStatus.length && showStatus[i]) {
                return datasetIndex === 0 ? '#ff0000' : '#ffff00'; // CRISE
            }
            return datasetIndex === 0 ? '#00d2ff' : '#ff0055'; // CALME
        }

        function fmtTime(v) {
            const m = Math.floor(v / 60);
            const s = Math.floor(v % 60);
            return `${m}m ${s}s`;
        }

        function updateDashboard(d) {
            // Indicateurs
            const iaRaw = d.is_seizure_raw ? "🔴" : "🟢";
            const info = ` [IA Brut:${iaRaw} | Final:${d.is_seizure ? "CRISE" : "CALME"} | Vérité:${d.debug_label}]`;
            
            const fDisplay = document.getElementById('filenameDisplay');
            fDisplay.innerText = d.filename + info;
            fDisplay.className = (d.debug_match === false) ? "text-warning fw-bold blink" : "";

            // Stats
            if(d.stats) {
                document.getElementById('val-amp').innerText = Math.round(d.stats.max) + " µV";
                document.getElementById('val-std').innerText = Math.round(d.stats.std);
                document.getElementById('val-prev-dur').innerText = d.stats.prev_dur + (d.stats.prev_dur !== '-' ? ' s' : '');
                document.getElementById('val-prev-int').innerText = d.stats.prev_int;
                
                // Panel Alerte
                const badge = document.getElementById('aiStatus');
                const bigText = document.getElementById('seizureText');
                const box = document.getElementById('durationBox');

                if(d.is_seizure) {
                    badge.innerText = "CRISE EN COURS"; badge.className = "badge bg-danger blink";
                    bigText.innerText = "OUI"; bigText.className = "display-4 fw-bold text-danger blink";
                    box.classList.remove('d-none');
                    document.getElementById('val-dur').innerText = d.stats.duration || 0;
                } else {
                    badge.innerText = "Monitoring Actif"; badge.className = "badge bg-success";
                    bigText.innerText = "NON"; bigText.className = "display-4 fw-bold text-success";
                    box.classList.add('d-none');
                }
            }
        }
    </script>
</body>
</html>
